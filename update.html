<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroAtlas — Actualizar</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}
.card {
  background: rgba(30,30,60,0.95);
  border-radius: 20px;
  padding: 40px 30px;
  max-width: 380px;
  width: 100%;
  text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
h1 { font-size: 1.4em; margin-bottom: 12px; color: #e8c84a; }
p { font-size: 0.95em; line-height: 1.5; margin-bottom: 20px; color: rgba(255,255,255,0.7); }
.status {
  font-size: 1.1em;
  font-weight: 600;
  color: #4ecdc4;
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.spinner {
  display: inline-block;
  width: 24px; height: 24px;
  border: 3px solid rgba(78,205,196,0.3);
  border-top-color: #4ecdc4;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.btn {
  display: none;
  margin-top: 16px;
  padding: 14px 28px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 1em;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
}
</style>
</head>
<body>
<div class="card">
  <h1>🔄 Actualizar AstroAtlas</h1>
  <p>Esto limpia la versión vieja y descarga la más reciente.</p>
  <div class="status" id="status"><span class="spinner"></span> Limpiando caché...</div>
  <button class="btn" id="openBtn" onclick="window.location.href='/astro-atlas/';">Abrir AstroAtlas ✨</button>
</div>
<script>
(function() {
  var statusEl = document.getElementById('status');
  var btnEl = document.getElementById('openBtn');

  function setStatus(msg) {
    statusEl.innerHTML = '<span class="spinner"></span> ' + msg;
  }
  function done(msg) {
    statusEl.innerHTML = '✅ ' + msg;
    btnEl.style.display = 'block';
  }
  function fail(msg) {
    statusEl.innerHTML = '⚠️ ' + msg;
    btnEl.style.display = 'block';
  }

  async function forceUpdate() {
    try {
      // Step 1: Delete all caches
      setStatus('Borrando caché...');
      var keys = await caches.keys();
      await Promise.all(keys.map(function(k) { return caches.delete(k); }));

      // Step 2: Unregister all service workers
      setStatus('Removiendo service worker...');
      var regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(function(r) { return r.unregister(); }));

      // Step 3: Pre-fetch fresh index.html to warm up
      setStatus('Descargando versión nueva...');
      await fetch('/astro-atlas/index.html?_force=' + Date.now(), { cache: 'no-store' });
      await fetch('/astro-atlas/sw.js?_force=' + Date.now(), { cache: 'no-store' });

      done('¡Listo! Toca el botón para abrir.');
    } catch (err) {
      console.error('Update error:', err);
      fail('Error: ' + err.message + '. Toca el botón para intentar abrir.');
    }
  }

  forceUpdate();
})();
</script>
</body>
</html>
